<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Misión Semiótica estilo Sherlock Holmes · Circuito interactivo · Semana 14 · Semiótica Visual · Unidad 4 · Modelo IUTPC" />
<title>Baker Street Visual Lab · Circuito de la Misión Semiótica</title>
<style>
/* ============================================================
   BAKER STREET VISUAL LAB — Circuito secuencial gamificado
   Estética Web 2.0 (2000–2010): degradados, glossy, sombras,
   bordes redondeados, iconografía brillante, colores intensos.
   ============================================================ */
:root{
  --c-paper:#fdf6e3; --c-card:#fffdf6; --c-card-edge:#e4d4a8;
  --c-navy:#16314a; --c-navy-2:#21557e; --c-teal:#1f8a99;
  --c-amber:#f5a623; --c-amber-2:#ffcb52; --c-red:#d0342c; --c-red-2:#ef5b52;
  --c-green:#3f9b46; --c-green-2:#6fd07a;
  --c-text:#21303f; --c-text-soft:#50657a;
  --c-shadow:rgba(20,40,70,.28); --c-glow:rgba(245,166,35,.55);
  --grad-header:linear-gradient(180deg,#2a6896 0%,#16314a 55%,#0e2236 100%);
  --grad-page:radial-gradient(circle at 20% -10%,#2c5d86 0%,#16314a 38%,#0c1c2c 100%);
  --font-display:"Georgia","Times New Roman",serif;
  --font-body:"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --radius:16px;
}
html[data-theme="dark"]{
  --c-paper:#16222e; --c-card:#1b2937; --c-card-edge:#2c4055;
  --c-text:#e7eef5; --c-text-soft:#9fb4c7; --c-shadow:rgba(0,0,0,.55);
  --grad-page:radial-gradient(circle at 20% -10%,#16344e 0%,#0d1c2b 45%,#060e16 100%);
  --grad-header:linear-gradient(180deg,#1b466b 0%,#0c2236 60%,#060e16 100%);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-body);color:var(--c-text);background:var(--grad-page) fixed;background-color:#0c1c2c;line-height:1.55;-webkit-font-smoothing:antialiased;}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:22px 22px;}

/* HEADER */
header.app-header{position:sticky;top:0;z-index:50;background:var(--grad-header);border-bottom:3px solid var(--c-amber);box-shadow:0 6px 18px var(--c-shadow),inset 0 1px 0 rgba(255,255,255,.18);color:#fff;}
.header-inner{max-width:1180px;margin:0 auto;padding:10px 18px;display:grid;gap:8px;grid-template-columns:auto 1fr auto;align-items:center;}
.brand{display:flex;align-items:center;gap:12px;min-width:0;}
.brand .seal{width:52px;height:52px;flex:none;border-radius:50%;background:radial-gradient(circle at 35% 28%,#ffe6a8 0%,var(--c-amber) 42%,#b9760d 100%);box-shadow:inset 0 2px 4px rgba(255,255,255,.7),inset 0 -4px 8px rgba(0,0,0,.35),0 3px 8px rgba(0,0,0,.4);display:grid;place-items:center;font-size:26px;}
.brand h1{font-family:var(--font-display);font-size:1.16rem;margin:0;line-height:1.05;text-shadow:0 1px 0 rgba(0,0,0,.45);}
.brand h1 small{display:block;font-size:.66rem;font-weight:400;color:var(--c-amber-2);letter-spacing:.12em;text-transform:uppercase;}
.header-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-weight:700;font-size:.8rem;background:linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.35);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 4px rgba(0,0,0,.3);text-shadow:0 1px 0 rgba(0,0,0,.3);white-space:nowrap;}
.pill.score{background:linear-gradient(180deg,#7fe0ef,#1f8a99);border-color:#bff3fb;}
.pill.badges{background:linear-gradient(180deg,#ffd86b,#e0890d);border-color:#ffe9b0;}
.pill.phase{background:linear-gradient(180deg,#ef7d76,#b3221b);border-color:#ffb6b1;}
.theme-toggle{cursor:pointer;border:1px solid rgba(255,255,255,.4);background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.04));color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.1rem;box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 2px 5px rgba(0,0,0,.35);}
.theme-toggle:active{transform:translateY(1px);}
.progress-wrap{grid-column:1/-1;height:15px;border-radius:999px;overflow:hidden;background:linear-gradient(180deg,#0a1828,#13283c);box-shadow:inset 0 2px 4px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);position:relative;}
.progress-bar{height:100%;width:0%;background:linear-gradient(180deg,#ffe07a 0%,var(--c-amber) 50%,#c9810c 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 -3px 6px rgba(0,0,0,.25);transition:width .5s cubic-bezier(.2,.9,.3,1);}
.progress-label{position:absolute;inset:0;display:grid;place-items:center;font-size:.68rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.7);letter-spacing:.04em;}

/* CIRCUIT MAP */
.circuit{position:sticky;top:96px;z-index:40;background:rgba(8,20,32,.82);backdrop-filter:blur(4px);border-bottom:1px solid rgba(255,255,255,.08);}
.circuit-inner{max-width:1180px;margin:0 auto;padding:10px 16px;display:flex;gap:6px;align-items:center;overflow-x:auto;}
.node{flex:none;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.55;min-width:74px;}
.node.reached{opacity:1;}
.node .dot{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:1.1rem;background:linear-gradient(180deg,#3a546c,#1d3040);border:2px solid #55708a;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);color:#cfe0ee;}
.node.reached .dot{background:linear-gradient(180deg,#ffe07a,#e0890d);border-color:#ffe6a0;color:#3a2400;}
.node.current .dot{box-shadow:0 0 0 3px var(--c-glow),inset 0 1px 0 rgba(255,255,255,.5);transform:scale(1.08);}
.node.done .dot::after{content:"✓";position:absolute;}
.node .lbl{font-size:.62rem;font-weight:700;color:#cfe0ee;text-align:center;line-height:1.1;}
.node.reached .lbl{color:#fff;}
.connector{flex:none;width:26px;height:3px;border-radius:3px;background:repeating-linear-gradient(90deg,#55708a 0 6px,transparent 6px 11px);align-self:center;margin-top:-14px;}

/* STEP VIEWPORT */
main{max-width:880px;margin:0 auto;padding:22px 16px 110px;position:relative;z-index:1;}
.step-card{background:var(--c-card);border:1px solid var(--c-card-edge);border-radius:var(--radius);box-shadow:0 10px 28px var(--c-shadow),inset 0 1px 0 rgba(255,255,255,.6);overflow:hidden;animation:stepIn .35s ease;}
@keyframes stepIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.step-top{padding:16px 20px;color:#fff;background:linear-gradient(135deg,var(--c-navy-2),var(--c-navy) 72%);position:relative;overflow:hidden;}
.step-top::after{content:"";position:absolute;top:0;left:0;right:0;height:46%;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent);pointer-events:none;}
.step-kicker{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--c-amber-2);font-weight:800;}
.step-top h2{font-family:var(--font-display);margin:4px 0 0;font-size:1.4rem;text-shadow:0 2px 3px rgba(0,0,0,.5);}
.step-body{padding:20px;display:flex;flex-direction:column;gap:16px;}

/* narrative */
.story{font-size:1.02rem;color:var(--c-text);background:var(--c-paper);border-left:5px solid var(--c-amber);border-radius:10px;padding:14px 16px;box-shadow:inset 0 1px 0 #fff;}
.story p{margin:0 0 10px;}
.story p:last-child{margin:0;}
.story .holmes{font-style:italic;color:var(--c-text-soft);}
.brief-grid{display:grid;gap:10px;}
.brief-grid .row{background:var(--c-paper);border:1px solid var(--c-card-edge);border-radius:10px;padding:10px 14px;}
.brief-grid .row b{color:var(--c-navy);}
html[data-theme="dark"] .brief-grid .row b{color:var(--c-amber-2);}

/* question item */
.qitem{border:1px solid var(--c-card-edge);border-radius:12px;padding:14px;background:linear-gradient(180deg,rgba(255,255,255,.5),transparent);}
html[data-theme="dark"] .qitem{background:linear-gradient(180deg,rgba(255,255,255,.05),transparent);}
.qhead{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.q-icon{width:32px;height:32px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:1rem;box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 -3px 5px rgba(0,0,0,.25),0 2px 4px rgba(0,0,0,.25);}
.q-icon.open{background:radial-gradient(circle at 35% 28%,#9be7ff,var(--c-teal) 70%);color:#063a42;}
.q-icon.closed{background:radial-gradient(circle at 35% 28%,#ffb1ab,var(--c-red) 70%);color:#fff;}
.q-tag{font-size:.66rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--c-text-soft);}
.q-pts{margin-left:auto;font-size:.7rem;font-weight:800;color:#fff;padding:3px 9px;border-radius:999px;background:linear-gradient(180deg,#6fd07a,#2f7a3a);box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(0,0,0,.3);white-space:nowrap;}
.q-text{font-weight:600;margin-bottom:8px;}
.q-just{font-size:.74rem;color:var(--c-text-soft);font-style:italic;}
textarea,input.open-input{width:100%;font:inherit;color:var(--c-text);padding:10px 12px;border-radius:12px;border:1px solid var(--c-card-edge);background:linear-gradient(180deg,#fbf5e4,#fffdf8);box-shadow:inset 0 2px 4px rgba(0,0,0,.12);resize:vertical;min-height:64px;}
html[data-theme="dark"] textarea,html[data-theme="dark"] input.open-input{background:linear-gradient(180deg,#13202c,#1a2b3a);}
input.open-input{min-height:0;}
textarea:focus,input.open-input:focus{outline:none;border-color:var(--c-amber);box-shadow:inset 0 2px 4px rgba(0,0,0,.12),0 0 0 3px var(--c-glow);}
.charmeter{font-size:.72rem;color:var(--c-text-soft);display:flex;justify-content:space-between;gap:8px;margin-top:6px;}
.status{font-size:.78rem;font-weight:700;padding:6px 10px;border-radius:10px;display:none;align-items:center;gap:6px;margin-top:6px;}
.status.ok{display:flex;color:#1d5e26;background:#dff5e1;border:1px solid #aadcb0;}
.status.pending{display:flex;color:#8a5a00;background:#fdf0cf;border:1px solid #f0d68c;}
html[data-theme="dark"] .status.ok{background:#13351a;color:#9fe6a9;border-color:#2c6b37;}
html[data-theme="dark"] .status.pending{background:#3a2e0e;color:#ffd97a;border-color:#7a5e1c;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:10px;align-items:flex-start;cursor:pointer;padding:10px 12px;border-radius:12px;background:linear-gradient(180deg,#fff,#eef3f7);border:1px solid #cfdbe5;box-shadow:inset 0 1px 0 #fff,0 1px 3px rgba(0,0,0,.18);transition:transform .08s,box-shadow .15s;}
html[data-theme="dark"] .opt{background:linear-gradient(180deg,#1f3041,#172533);border-color:#33485c;box-shadow:none;}
.opt:hover{transform:translateY(-1px);}
.opt input{margin-top:3px;accent-color:var(--c-teal);transform:scale(1.2);}
.opt.correct{background:linear-gradient(180deg,#dff5e1,#bfe9c5);border-color:#74c47e;}
.opt.wrong{background:linear-gradient(180deg,#fde2e0,#f6c2bd);border-color:#e08a83;}
.opt .opt-letter{font-weight:800;color:var(--c-navy);}
html[data-theme="dark"] .opt .opt-letter{color:var(--c-amber-2);}
.feedback{display:none;margin-top:8px;font-size:.82rem;border-radius:12px;padding:10px 12px;background:linear-gradient(180deg,#eef7ff,#dbeeff);border:1px solid #acd2f0;color:#13405e;}
html[data-theme="dark"] .feedback{background:#102739;border-color:#2b5274;color:#bfe0fb;}
.feedback.show{display:block;}

/* investigation / prompts */
.invscene{background:var(--c-paper);border:1px dashed var(--c-card-edge);border-radius:12px;padding:14px;}
.invscene .lead{font-weight:600;margin-bottom:10px;}
.prompt-card{background:var(--c-card);border:1px solid var(--c-card-edge);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 3px 8px var(--c-shadow);}
.prompt-card h4{margin:0 0 4px;font-size:.92rem;color:var(--c-navy);display:flex;align-items:center;gap:8px;}
html[data-theme="dark"] .prompt-card h4{color:var(--c-amber-2);}
.prompt-card .emphasis{font-size:.72rem;color:var(--c-text-soft);font-style:italic;margin-bottom:8px;}
.prompt-text{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem;background:linear-gradient(180deg,#0e2233,#14304a);color:#e9d9a8;border-radius:8px;padding:10px;white-space:pre-wrap;border:1px solid #0a1828;}
.copy-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.copy-ok{font-size:.74rem;font-weight:700;color:var(--c-green);display:none;}
.copy-ok.show{display:inline;}

/* games */
.game-wrap{background:var(--c-paper);border:2px solid var(--c-amber);border-radius:14px;padding:14px;box-shadow:inset 0 1px 0 #fff,0 4px 12px var(--c-shadow);}
.game-wrap .gtitle{font-family:var(--font-display);font-weight:bold;color:var(--c-navy);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
html[data-theme="dark"] .game-wrap .gtitle{color:var(--c-amber-2);}
.game-wrap .grules{font-size:.8rem;color:var(--c-text-soft);margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{cursor:pointer;padding:9px 13px;border-radius:11px;font-weight:700;font-size:.84rem;background:linear-gradient(180deg,#fff,#dfeaf2);border:1px solid #b9cad8;color:var(--c-navy);box-shadow:inset 0 1px 0 #fff,0 2px 5px rgba(0,0,0,.25);transition:transform .1s;}
html[data-theme="dark"] .chip{background:linear-gradient(180deg,#243748,#1b2b3a);color:#e7eef5;border-color:#33485c;}
.chip.sel{outline:3px solid var(--c-glow);transform:translateY(-1px);}
.chip.locked{background:linear-gradient(180deg,#dff5e1,#bfe9c5);border-color:#74c47e;color:#1d5e26;cursor:default;}
.chip.order-num{background:linear-gradient(180deg,#ffe07a,#e0890d);border-color:#ffe6a0;color:#3a2400;}
.chip.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.bins{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.bin{border:2px dashed var(--c-card-edge);border-radius:12px;padding:12px;min-height:90px;background:rgba(0,0,0,.03);}
html[data-theme="dark"] .bin{background:rgba(255,255,255,.04);}
.bin h5{margin:0 0 8px;font-size:.82rem;color:var(--c-navy);}
html[data-theme="dark"] .bin h5{color:var(--c-amber-2);}
.bin.flash{animation:shake .4s;border-color:var(--c-red);}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.match-cols .col{display:flex;flex-direction:column;gap:8px;}
.match-cols .col h5{margin:0 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-soft);}
.game-done{margin-top:12px;font-weight:800;color:var(--c-green);display:none;align-items:center;gap:8px;}
.game-done.show{display:flex;}
.game-msg{margin-top:8px;font-size:.82rem;min-height:1.2em;color:var(--c-text-soft);}

/* hotspot svg */
.poster{width:100%;max-width:360px;margin:0 auto;display:block;border-radius:10px;border:1px solid var(--c-card-edge);box-shadow:0 4px 10px var(--c-shadow);}
.poster [data-hot]{cursor:pointer;transition:opacity .15s;}
.poster [data-hot]:hover{opacity:.8;}

/* tables */
.info-panel{background:var(--c-paper);border:1px solid var(--c-card-edge);border-radius:12px;padding:14px;}
.info-panel h3{font-family:var(--font-display);margin:0 0 10px;color:var(--c-navy);}
html[data-theme="dark"] .info-panel h3{color:var(--c-amber-2);}
table.grid{width:100%;border-collapse:collapse;font-size:.84rem;}
table.grid th,table.grid td{border:1px solid var(--c-card-edge);padding:8px 10px;text-align:left;vertical-align:top;}
table.grid th{background:linear-gradient(180deg,#2a6896,#16314a);color:#fff;}
table.grid tbody tr:nth-child(even) td{background:rgba(0,0,0,.04);}
html[data-theme="dark"] table.grid tbody tr:nth-child(even) td{background:rgba(255,255,255,.04);}
.checklist{display:flex;flex-direction:column;gap:8px;}
.chk-item{display:flex;gap:10px;align-items:center;cursor:pointer;padding:10px 12px;border-radius:12px;background:linear-gradient(180deg,#fff,#eef3f7);border:1px solid #cfdbe5;}
html[data-theme="dark"] .chk-item{background:linear-gradient(180deg,#1f3041,#172533);border-color:#33485c;}
.chk-item input{transform:scale(1.3);accent-color:var(--c-green);}
.chk-item.done{background:linear-gradient(180deg,#dff5e1,#bfe9c5);border-color:#74c47e;}

/* buttons + nav */
.btn{cursor:pointer;font:inherit;font-weight:800;color:#3a2400;padding:11px 20px;border-radius:13px;border:1px solid #ffe6a0;background:linear-gradient(180deg,#ffe07a 0%,var(--c-amber) 55%,#c9810c 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 4px 10px rgba(0,0,0,.4);text-shadow:0 1px 0 rgba(255,255,255,.4);}
.btn:hover{filter:brightness(1.06);}
.btn:active{transform:translateY(2px);}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5);transform:none;}
.btn.solve{background:linear-gradient(180deg,#7fe0ef,#1f8a99);color:#053038;border-color:#bff3fb;}
.btn.ghost{background:linear-gradient(180deg,#fff,#dfeaf2);color:var(--c-navy);border-color:#b9cad8;}
.btn.small{padding:7px 13px;font-size:.8rem;border-radius:10px;}
.navbar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--grad-header);border-top:2px solid var(--c-amber);box-shadow:0 -6px 16px var(--c-shadow);}
.navbar-inner{max-width:880px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.navbar .hint{flex:1;color:#cfe0ee;font-size:.8rem;}
.navbar .hint b{color:var(--c-amber-2);}

/* badges */
.badge-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.badge{text-align:center;padding:12px 8px;border-radius:14px;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.1));border:1px dashed var(--c-card-edge);opacity:.5;filter:grayscale(.8);transition:all .4s;}
.badge.unlocked{opacity:1;filter:none;border-style:solid;border-color:var(--c-amber);background:linear-gradient(180deg,#fff7e2,#ffe9b8);box-shadow:0 0 16px var(--c-glow),inset 0 1px 0 #fff;}
html[data-theme="dark"] .badge.unlocked{background:linear-gradient(180deg,#3a2e0e,#5a4514);}
.badge .medal{width:54px;height:54px;margin:0 auto 8px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#ffe6a8,var(--c-amber) 55%,#9c6709 100%);box-shadow:inset 0 2px 4px rgba(255,255,255,.8),inset 0 -5px 9px rgba(0,0,0,.4),0 3px 7px rgba(0,0,0,.4);display:grid;place-items:center;font-size:1.7rem;}
.badge.unlocked .medal{animation:pop .5s;}
@keyframes pop{0%{transform:scale(.4) rotate(-20deg);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
.badge .b-name{font-size:.76rem;font-weight:800;}
.badge .b-status{font-size:.64rem;color:var(--c-text-soft);}

/* result overlay */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(6,14,22,.78);backdrop-filter:blur(3px);place-items:center;padding:18px;}
.overlay.show{display:grid;}
.result-card{max-width:540px;width:100%;background:var(--c-paper);border-radius:20px;border:2px solid var(--c-amber);box-shadow:0 18px 50px rgba(0,0,0,.6);padding:26px;text-align:center;animation:stepIn .4s ease;}
.result-card .rank-seal{width:104px;height:104px;margin:0 auto 12px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#ffe6a8,var(--c-amber) 52%,#9c6709 100%);box-shadow:inset 0 3px 6px rgba(255,255,255,.8),inset 0 -7px 12px rgba(0,0,0,.45),0 5px 12px rgba(0,0,0,.5);display:grid;place-items:center;font-size:2.9rem;}
.result-card h2{font-family:var(--font-display);color:var(--c-navy);margin:6px 0;}
html[data-theme="dark"] .result-card h2{color:var(--c-amber-2);}
.result-score{font-size:2.6rem;font-weight:900;color:var(--c-teal);line-height:1;}
.result-card .rank-name{font-size:1.3rem;font-weight:800;color:var(--c-red);margin:8px 0;}
.result-card .rank-msg{color:var(--c-text-soft);font-size:.92rem;}
.result-breakdown{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0;}
.result-breakdown span{font-size:.76rem;font-weight:700;background:rgba(0,0,0,.06);padding:6px 12px;border-radius:999px;}
html[data-theme="dark"] .result-breakdown span{background:rgba(255,255,255,.08);}

/* toast */

function done(s,ids){return ids.every(id=>(s.open[id]||"").trim().length>=MIN_LEN);}
function ans(s,ids){return ids.every(id=>s.closed[id]!==undefined);}

/* =====================================================================
   ESTADO + PERSISTENCIA
   ===================================================================== */
const STORE="bakerstreet_circuit_v2";
function blank(){return{step:0,maxStep:0,open:{},closed:{},chk:[],games:{},badges:[],theme:null};}
let state=load();
function load(){try{const r=JSON.parse(localStorage.getItem(STORE));if(r)return Object.assign(blank(),r);}catch(e){}return blank();}
function save(){try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}

const TOTAL_ITEMS=Object.keys(OPEN_PTS).length + Object.keys(ITEMS).filter(k=>k[0]==="c").length + GAME_IDS.length + CHECKLIST_ITEMS.length;

function computeScore(){
 let pts=0,done=0;
 for(const id in OPEN_PTS){const v=(state.open[id]||"").trim();if(v.length>=MIN_LEN){pts+=OPEN_PTS[id];done++;}}
 for(const id in ITEMS){if(id[0]==="c"&&state.closed[id]!==undefined){done++;if(state.closed[id]===ITEMS[id].correct)pts+=CLOSED_PTS;}}
 GAME_IDS.forEach(g=>{if(state.games[g]){pts+=GAME_PTS;done++;}});
 pts+=(state.chk||[]).length*CHK_PTS;done+=(state.chk||[]).length;
 pts+=(state.badges||[]).length*BADGE_PTS;
 return{pts,done};
}

/* =====================================================================
   GATING: ¿puede avanzar?
   ===================================================================== */
function canAdvance(step){
 if(step.kind==="station"){
   return step.items.every(id=>{
     if(id[0]==="o")return (state.open[id]||"").trim().length>=MIN_LEN;
     if(id[0]==="c")return state.closed[id]!==undefined;
     return true;
   });
 }
 if(step.kind==="game")return !!state.games[step.game];
 return true; // story/brief/invest/ficha/rubric/result
}
function advanceHint(step){
 if(step.kind==="station"){
   const pend=step.items.filter(id=>{if(id[0]==="o")return (state.open[id]||"").trim().length<MIN_LEN;if(id[0]==="c")return state.closed[id]===undefined;return false;});
   if(pend.length) return `Completa <b>${pend.length}</b> actividad(es) para continuar.`;
   return "Estación resuelta. ¡Avanza, detective!";
 }
 if(step.kind==="game") return state.games[step.game]?"Reto superado. ¡Continúa!":"Resuelve el reto para desbloquear el siguiente paso.";
 if(step.kind==="result") return "Pulsa <b>Resolver el caso</b> para ver tu rango.";
 return "Lee la pista y pulsa <b>Siguiente</b>.";
}

const stepView=document.getElementById("stepView");
const circuitMap=document.getElementById("circuitMap");

function phaseFirstStep(ph){return STEPS.findIndex(s=>s.phase===ph);}
function phaseDone(ph){return STEPS.every((s,i)=>s.phase!==ph||canAdvance(s)||i>state.maxStep);}

function renderCircuit(){
 const cur=STEPS[state.step].phase;
 let html="";
 [1,2,3,4,5].forEach((ph,idx)=>{
   const reached=state.maxStep>=phaseFirstStep(ph);
   const isDone=reached && STEPS.filter(s=>s.phase===ph).every(s=>canAdvance(s));
   html+=`<div class="node ${reached?'reached':''} ${cur===ph?'current':''}" data-ph="${ph}">
     <div class="dot">${isDone?'✓':PHASE_META[ph].icon}</div>
     <div class="lbl">F${ph}<br>${PHASE_META[ph].name}</div></div>`;
   if(idx<4)html+=`<div class="connector"></div>`;
 });
 circuitMap.innerHTML=html;
 circuitMap.querySelectorAll(".node").forEach(n=>n.addEventListener("click",()=>{
   const ph=+n.dataset.ph, target=phaseFirstStep(ph);
   if(target<=state.maxStep){goTo(target);}
 }));
}

 }else if(g.type==="sort"){

 }else if(g.type==="match"){

   const right=order.map(idx=>`<div class="chip" data-def="${idx}">${g.pairs[idx].b}</div>`).join("");
   body=`<div class="match-cols"><div class="col"><h5>Figura</h5>${left}</div><div class="col"><h5>Definición</h5>${right}</div></div>`;
 }else if(g.type==="order"){
   const order=shuffle(g.steps.map((_,idx)=>idx));
   body=`<div class="chips" data-order="${gid}">${order.map(idx=>`<div class="chip" data-step="${idx}">${g.steps[idx]}</div>`).join("")}</div>`;

 return `<div class="game-wrap" data-gamewrap="${gid}"><div class="gtitle">${g.title}</div><div class="grules">${g.rules}</div>

   <div class="game-done ${solved?'show':''}" data-gdone="${gid}">✅ ¡Reto superado! +${GAME_PTS} pts</div></div>`;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* =====================================================================
   WIRING
   ===================================================================== */
function wireStep(step){
 // open
 stepView.querySelectorAll(".answer").forEach(el=>{
   el.value=state.open[el.dataset.id]||"";
   el.addEventListener("input",()=>{state.open[el.dataset.id]=el.value;updateOpenStatus(el.dataset.id);onChange();});
 });
 // closed
 stepView.querySelectorAll("[data-closed]").forEach(grp=>{
   const id=grp.dataset.closed;
   grp.querySelectorAll("input[type=radio]").forEach(r=>r.addEventListener("change",()=>{state.closed[id]=+r.value;revealClosed(id);onChange();}));
 });
 // checklist
 stepView.querySelectorAll("[data-chk]").forEach(lbl=>{
   const idx=+lbl.dataset.chk,cb=lbl.querySelector("input");
   cb.addEventListener("change",()=>{const set=new Set(state.chk||[]);cb.checked?set.add(idx):set.delete(idx);state.chk=[...set].sort((a,b)=>a-b);onChange();});
 });
 // copy prompts
 stepView.querySelectorAll(".copy-btn").forEach(btn=>btn.addEventListener("click",()=>{
   const key=btn.dataset.copy,txt=stepView.querySelector(`[data-prompt="${key}"]`).textContent;
   copyText(txt);const ok=stepView.querySelector(`[data-ok="${key}"]`);ok.classList.add("show");setTimeout(()=>ok.classList.remove("show"),1600);
 }));
 // games
 if(step.kind==="game")wireGame(step.game);
 // result
 const ev=document.getElementById("evaluateBtn");if(ev)ev.addEventListener("click",evaluateCase);
}

function wireGame(gid){
 const g=GAMES[gid],solved=!!state.games[gid];
 const wrap=stepView.querySelector(`[data-gamewrap="${gid}"]`);
 const msg=stepView.querySelector(`[data-gmsg="${gid}"]`);
 const finish=()=>{state.games[gid]=true;stepView.querySelector(`[data-gdone="${gid}"]`).classList.add("show");onChange();};

 if(g.type==="hotspot"){
   const svg=wrap.querySelector("svg");
   if(solved){msg.textContent="✔️ Identificaste el foco principal: el bloque de mayor tamaño y contraste.";return;}
   svg.querySelectorAll("[data-hot]").forEach(el=>el.addEventListener("click",()=>{
     if(el.dataset.hot==="focus"){el.setAttribute("stroke","#3f9b46");el.setAttribute("stroke-width","4");msg.textContent="✔️ ¡Correcto! El titular grande y contrastado es el primer foco de atención.";finish();}
     else{el.classList.add("shake");setTimeout(()=>el.classList.remove("shake"),400);msg.textContent="✏️ Ese no domina la lectura. Busca el de mayor tamaño y contraste.";}
   }));
 }
 else if(g.type==="sort"){
   if(solved){msg.textContent="✔️ Clasificación correcta entre denotación y connotación.";wrap.querySelectorAll(".chip").forEach(c=>c.classList.add("locked"));return;}
   let sel=null,placed=0;const total=g.items.length;
   wrap.querySelectorAll(".chip[data-item]").forEach(c=>c.addEventListener("click",()=>{
     if(c.classList.contains("locked"))return;
     wrap.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));c.classList.add("sel");sel=c;msg.textContent="Ahora elige el nivel correcto.";
   }));
   wrap.querySelectorAll(".bin").forEach(bin=>bin.addEventListener("click",()=>{
     if(!sel)return;const idx=+sel.dataset.item,correct=g.items[idx].bin,bi=+bin.dataset.bin;
     if(bi===correct){sel.classList.remove("sel");sel.classList.add("locked");bin.querySelector(".bin-drop").appendChild(sel);placed++;msg.textContent="✔️ Bien clasificado.";sel=null;if(placed===total){msg.textContent="✔️ ¡Todos los indicios clasificados!";finish();}}
     else{bin.classList.add("flash");setTimeout(()=>bin.classList.remove("flash"),400);msg.textContent="✖️ Ese indicio no pertenece a ese nivel. Inténtalo de nuevo.";}
   }));
 }
 else if(g.type==="match"){
   if(solved){msg.textContent="✔️ Todas las figuras emparejadas con su definición.";wrap.querySelectorAll(".chip").forEach(c=>c.classList.add("locked"));return;}
   let selTerm=null,matched=0;const total=g.pairs.length;
   wrap.querySelectorAll(".chip[data-term]").forEach(c=>c.addEventListener("click",()=>{
     if(c.classList.contains("locked"))return;
     wrap.querySelectorAll(".chip[data-term]").forEach(x=>x.classList.remove("sel"));c.classList.add("sel");selTerm=c;msg.textContent="Elige su definición.";
   }));
   wrap.querySelectorAll(".chip[data-def]").forEach(c=>c.addEventListener("click",()=>{
     if(c.classList.contains("locked")||!selTerm)return;
     if(+c.dataset.def===+selTerm.dataset.term){c.classList.add("locked");selTerm.classList.remove("sel");selTerm.classList.add("locked");matched++;msg.textContent="✔️ ¡Par correcto!";selTerm=null;if(matched===total){msg.textContent="✔️ ¡Todas las figuras emparejadas!";finish();}}
     else{c.classList.add("shake");setTimeout(()=>c.classList.remove("shake"),400);msg.textContent="✖️ No corresponde. Revisa la definición.";}
   }));
 }
 else if(g.type==="order"){
   if(solved){msg.textContent="✔️ Secuencia correcta: Observar → Describir → Interpretar → Relacionar → Argumentar → Reflexionar.";wrap.querySelectorAll(".chip").forEach(c=>c.classList.add("locked"));return;}
   let next=0;const total=g.steps.length;
   wrap.querySelectorAll(".chip[data-step]").forEach(c=>c.addEventListener("click",()=>{
     if(c.classList.contains("locked"))return;
     if(+c.dataset.step===next){c.classList.add("locked","order-num");c.textContent=(next+1)+". "+g.steps[next];next++;msg.textContent="✔️ Paso correcto.";if(next===total){msg.textContent="✔️ ¡Recorrido completo!";finish();}}
     else{c.classList.add("shake");setTimeout(()=>c.classList.remove("shake"),400);msg.textContent="✖️ Ese no es el siguiente paso. Recuerda: primero observar, al final reflexionar.";}
   }));
 }
}

function copyText(t){
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t));}
 else fallbackCopy(t);
}
function fallbackCopy(t){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

/* ---------- status refresh ---------- */
function refreshStepStatuses(step){
 if(step.kind==="station"){
   step.items.forEach(id=>{
     if(id[0]==="o")updateOpenStatus(id);
     else if(state.closed[id]!==undefined)revealClosed(id);
   });
 }
 if(step.kind==="checklist"){(state.chk||[]).forEach(idx=>{const l=stepView.querySelector(`[data-chk="${idx}"]`);if(l){l.querySelector("input").checked=true;l.classList.add("done");}});}
}
function updateOpenStatus(id){
 const v=(state.open[id]||"").trim();
 const m=stepView.querySelector(`[data-meter="${id}"]`),st=stepView.querySelector(`[data-status="${id}"]`);
 if(m)m.textContent=`${v.length} caracteres`;
 if(!st)return;st.className="status";
 if(v.length===0)st.textContent="";
 else if(v.length>=MIN_LEN){st.classList.add("ok");st.textContent=`✔️ Respuesta registrada · +${OPEN_PTS[id]} pts`;}
 else{st.classList.add("pending");st.textContent=`✏️ Faltan ${MIN_LEN-v.length} caracteres para puntuar`;}
}
function revealClosed(id){
 const it=ITEMS[id],grp=stepView.querySelector(`[data-closed="${id}"]`);if(!grp)return;
 const chosen=state.closed[id];
 grp.querySelectorAll(".opt").forEach((opt,idx)=>{opt.classList.remove("correct","wrong");const r=opt.querySelector("input");if(idx===it.correct)opt.classList.add("correct");else if(idx===chosen)opt.classList.add("wrong");r.checked=(idx===chosen);});
 stepView.querySelector(`[data-fb="${id}"]`).classList.add("show");
}

function onChange(){evaluateBadges();updateHud();updateNav();renderCircuit();save();}

function evaluateBadges(){
 BADGES.forEach(b=>{if(!state.badges.includes(b.id)&&b.cond(state)){state.badges.push(b.id);toastBadge(b);const row=document.getElementById("badgeRow");if(row)renderBadgeRow();}});
}
function toastBadge(b){
 const w=document.getElementById("toastWrap"),t=document.createElement("div");t.className="toast";
 t.innerHTML=`<span class="t-medal">${b.icon}</span><span>Insignia desbloqueada<br><b>${b.name}</b> · +${BADGE_PTS} pts</span>`;
 w.appendChild(t);setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(()=>t.remove(),400);},3600);
}

/* ---------- HUD + NAV ---------- */
function updateHud(){
 const{pts,done}=computeScore();
 document.getElementById("scorePill").textContent=`🎯 ${pts} pts`;
 document.getElementById("badgePill").textContent=`🏅 ${state.badges.length}/${BADGES.length}`;
 document.getElementById("phasePill").textContent=`🧭 Fase ${STEPS[state.step].phase}`;
 const pct=Math.min(100,Math.round((done/TOTAL_ITEMS)*100));
 document.getElementById("progressBar").style.width=pct+"%";
 document.getElementById("progressLabel").textContent=`${pct}% del circuito · ${pts} pts`;
}
const prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),navHint=document.getElementById("navHint");
function updateNav(){
 const step=STEPS[state.step],last=state.step===STEPS.length-1;
 prevBtn.disabled=state.step===0;
 nextBtn.style.display=last?"none":"inline-block";
 nextBtn.disabled=!canAdvance(step);
 navHint.innerHTML=advanceHint(step);
}
function goTo(i){
 state.step=Math.max(0,Math.min(STEPS.length-1,i));
 state.maxStep=Math.max(state.maxStep,state.step);
 save();renderStep();renderCircuit();updateHud();window.scrollTo({top:0,behavior:"smooth"});
}
prevBtn.addEventListener("click",()=>goTo(state.step-1));
nextBtn.addEventListener("click",()=>{if(canAdvance(STEPS[state.step]))goTo(state.step+1);});

/* ---------- final ---------- */
function evaluateCase(){
 evaluateBadges();const{pts}=computeScore();const rank=RANKS.find(r=>pts>=r.min);
 document.getElementById("finalScore").textContent=pts;
 document.getElementById("rankName").textContent=rank.name;
 document.getElementById("rankMsg").textContent=rank.msg;
 document.getElementById("rankSeal").textContent=rank.icon;
 const openDone=Object.keys(OPEN_PTS).filter(id=>(state.open[id]||"").trim().length>=MIN_LEN).length;
 let cc=0,ca=0;for(const id in ITEMS){if(id[0]==="c"&&state.closed[id]!==undefined){ca++;if(state.closed[id]===ITEMS[id].correct)cc++;}}
 const gs=GAME_IDS.filter(g=>state.games[g]).length;
 document.getElementById("resultBreakdown").innerHTML=`<span>✍️ Abiertas: ${openDone}/21</span><span>❓ Cerradas: ${cc}/${ca||0}</span><span>🎮 Retos: ${gs}/${GAME_IDS.length}</span><span>✅ Checklist: ${(state.chk||[]).length}/5</span><span>🏅 Insignias: ${state.badges.length}/${BADGES.length}</span>`;
 document.getElementById("overlay").classList.add("show");save();
}
document.getElementById("closeOverlay").addEventListener("click",()=>document.getElementById("overlay").classList.remove("show"));
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")e.target.classList.remove("show");});
document.getElementById("restartCase").addEventListener("click",()=>{
 if(confirm("¿Reiniciar el caso? Se borrarán todas las respuestas, retos y puntajes.")){
   const theme=state.theme;state=blank();state.theme=theme;save();
   document.getElementById("overlay").classList.remove("show");
   renderStep();renderCircuit();updateHud();applyTheme();window.scrollTo({top:0,behavior:"smooth"});
 }
});

/* ---------- theme ---------- */
const themeToggle=document.getElementById("themeToggle");
function applyTheme(){
 let t=state.theme||((window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");
 document.documentElement.setAttribute("data-theme",t);themeToggle.textContent=t==="dark"?"☀️":"🌙";
}
themeToggle.addEventListener("click",()=>{const cur=document.documentElement.getAttribute("data-theme");state.theme=cur==="dark"?"light":"dark";applyTheme();save();});

/* ---------- timer ---------- */
function startTimer(){const pill=document.getElementById("timerPill");let s=0;setInterval(()=>{s++;pill.textContent=`⏱️ ${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;},1000);}

/* ---------- init ---------- */
applyTheme();renderStep();renderCircuit();updateHud();startTimer();
</script>
</body>
</html>
